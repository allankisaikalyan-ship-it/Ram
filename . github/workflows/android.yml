name: Build Omni AI APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Unzip Omni AI project
        run: |
          unzip -o "omniai (3).zip"
          echo "Files after unzip:"
          ls -la

      - name: Find project root with gradlew
        id: find_root
        run: |
          GRADLEW_PATH=$(find . -type f -name "gradlew" -print -quit)
          if [ -z "$GRADLEW_PATH" ]; then
            echo "Error: gradlew not found in zip"
            echo "Make sure gradlew is at top level of your zip"
            exit 1
          fi
          PROJECT_DIR=$(dirname "$GRADLEW_PATH")
          echo "Found gradlew at: $GRADLEW_PATH"
          echo "Project dir: $PROJECT_DIR"
          echo "dir=$PROJECT_DIR" >> $GITHUB_OUTPUT

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          
      - name: Make gradlew executable
        run: |
          chmod +x ${{ steps.find_root.outputs.dir }}/gradlew
          
      - name: Build APK
        run: |
          ${{ steps.find_root.outputs.dir }}/gradlew assembleDebug
      
      - uses: actions/upload-artifact@v4
        with:
          name: OmniAI-debug
          path: ${{ steps.find_root.outputs.dir }}/app/build/outputs/apk/debug/app-debug.apk
